name: Update Saxon ROR data

# Refreshes the Saxon ROR subset (and the OpenAlex companion layer) from the
# latest Zenodo dump. Polls daily and on manual dispatch, but a preflight check
# resolves the latest Zenodo DOI first: if it matches the DOI already recorded in
# data/meta.json, the run stops before downloading anything -- no dump fetch, no
# OpenAlex sweep, no pull request. Never pushes to the default branch: when the
# data actually changes, it opens a pull request instead.

on:
  schedule:
    # 06:00 UTC daily. Most runs no-op at the preflight step; the download and
    # OpenAlex sweep only happen on the day a new dump appears.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mailto:
        description: "Contact e-mail for the OpenAlex polite pool"
        required: false
        default: "bibliometrie@slub-dresden.de"
      force:
        description: "Ignore the freshness check and re-fetch regardless"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cheap probe: resolve the latest Zenodo DOI and compare it to what we
      # already have. On a match (and unless forced) the job stops here -- no
      # download, no OpenAlex sweep, no PR. This is what makes daily polling free.
      - name: Check for a new ROR release
        id: preflight
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          if [ "$FORCE" = "true" ]; then
            echo "Force requested -- skipping the freshness check."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          latest=$(PYTHONPATH=scripts python -c "import ror_lib as R; print(R.zenodo_latest()['doi'])")
          current=$(python -c "import json; print(json.load(open('data/meta.json')).get('ror', {}).get('zenodo_doi', ''))")
          echo "Latest Zenodo DOI:  ${latest:-<none>}"
          echo "Current data DOI:   ${current:-<none>}"
          if [ -n "$current" ] && [ "$latest" = "$current" ]; then
            echo "Already up to date -- nothing to do."
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected -- proceeding with update."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update ROR subset
        if: steps.preflight.outputs.fresh != 'true'
        run: python scripts/update_ror.py

      - name: Update OpenAlex companion data
        if: steps.preflight.outputs.fresh != 'true'
        run: >-
          python scripts/update_openalex.py
          --mailto "${{ github.event.inputs.mailto || 'bibliometrie@slub-dresden.de' }}"

      - name: Summarize changes
        id: diff
        if: steps.preflight.outputs.fresh != 'true'
        run: |
          if git diff --quiet -- data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

          # Per-record file adds/removals/modifications for the PR body.
          added=$(git diff --diff-filter=A --name-only -- data/records | wc -l | tr -d ' ')
          removed=$(git diff --diff-filter=D --name-only -- data/records | wc -l | tr -d ' ')
          modified=$(git diff --diff-filter=M --name-only -- data/records | wc -l | tr -d ' ')
          version=$(python -c "import json; print(json.load(open('data/meta.json'))['ror']['dump_version'])")
          count=$(python -c "import json; print(json.load(open('data/meta.json'))['ror']['record_count'])")
          # Real Zenodo creation moment of this dump -- used as the commit's
          # author date so `git log` reads as a true Zenodo timeline.
          created=$(python -c "import json; print(json.load(open('data/meta.json'))['ror']['zenodo_created'])")

          {
            echo "version=$version"
            echo "count=$count"
            echo "added=$added"
            echo "removed=$removed"
            echo "modified=$modified"
            echo "created=$created"
          } >> "$GITHUB_OUTPUT"

          {
            echo "Automated refresh from ROR dump **$version** â€” $count Saxon records."
            echo ""
            echo "| Change | Records |"
            echo "| --- | --- |"
            echo "| Added | $added |"
            echo "| Removed | $removed |"
            echo "| Modified | $modified |"
            echo ""
            if [ "$added" -gt 0 ]; then
              echo "**Added:**"
              git diff --diff-filter=A --name-only -- data/records | sed 's#data/records/#- \`#; s#\.json#\`#'
              echo ""
            fi
            if [ "$removed" -gt 0 ]; then
              echo "**Removed:**"
              git diff --diff-filter=D --name-only -- data/records | sed 's#data/records/#- \`#; s#\.json#\`#'
              echo ""
            fi
          } > /tmp/pr-body.md

      # Commit ourselves (rather than an action) so the commit's author date can
      # be set to the dump's real Zenodo creation moment. Landing the PR with
      # GitHub's "Rebase and merge" preserves that author date on main; the
      # committer date becomes the merge time, which is acceptable.
      - name: Open data-update pull request
        if: steps.preflight.outputs.fresh != 'true' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_DATE: ${{ steps.diff.outputs.created }}
          GIT_COMMITTER_DATE: ${{ steps.diff.outputs.created }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="automated/data-update"
          git switch -c "$branch"
          git add data
          git commit -m "data: update to ROR dump ${{ steps.diff.outputs.version }} (${{ steps.diff.outputs.count }} Saxon records)"
          git push --force origin "$branch"

          # Ensure the tracking label exists, then open the PR if none is open.
          gh label create data-update --color 0e8a16 --force >/dev/null 2>&1 || true
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --base main --head "$branch" \
              --title "data: update to ROR dump ${{ steps.diff.outputs.version }}" \
              --body-file /tmp/pr-body.md \
              --label data-update
          else
            gh pr edit "$branch" --body-file /tmp/pr-body.md
          fi
